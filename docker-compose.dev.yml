services:
  # ==================== DATABASE ====================
  postgres:
    image: pgvector/pgvector:pg17
    container_name: betterbundle-postgres-dev
    env_file:
      - .env.dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-config/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=postgres,env=dev"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== KAFKA ====================
  kafka_b:
    image: confluentinc/cp-kafka:7.8.0 # Use specific version
    container_name: kafka_b_dev
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    env_file:
      - .env.dev
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka_b:9093,PLAINTEXT_HOST://localhost:9092
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka_b:29093
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9093,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=kafka,env=dev"
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ==================== REDIS ====================
  redis:
    image: redis/redis-stack:7.2.0-v18
    container_name: betterbundle-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
      - "8002:8001"
    volumes:
      - redis_data:/data
    env_file:
      - .env.dev
    command:
      - /bin/sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes --appendfsync everysec --maxmemory 256mb --maxmemory-policy allkeys-lru --protected-mode no --loadmodule /opt/redis-stack/lib/redisearch.so --loadmodule /opt/redis-stack/lib/rejson.so --loadmodule /opt/redis-stack/lib/redistimeseries.so
        else
          exec redis-server --appendonly yes --appendfsync everysec --maxmemory 256mb --maxmemory-policy allkeys-lru --protected-mode no --loadmodule /opt/redis-stack/lib/redisearch.so --loadmodule /opt/redis-stack/lib/rejson.so --loadmodule /opt/redis-stack/lib/redistimeseries.so
        fi
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=redis,env=dev"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'if [ -n "$$REDIS_PASSWORD" ]; then redis-cli -a "$$REDIS_PASSWORD" ping; else redis-cli ping; fi',
        ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ==================== PYTHON WORKER ====================
  python-worker:
    build:
      context: ./python-worker
      dockerfile: Dockerfile.dev
    container_name: betterbundle-python-worker-dev
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    volumes:
      - ./python-worker:/app
      - /app/__pycache__
      - tfrs_models:/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka_b:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=python-worker,env=dev"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==================== DJANGO ADMIN (BACKOFFICE) ====================
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.dev
    container_name: betterbundle-admin-dev
    ports:
      - "8003:8000"
    env_file:
      - .env.dev
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
    volumes:
      - ./admin:/app
      - /app/venv
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c ''import urllib.request; urllib.request.urlopen("http://localhost:8000/")'' || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=admin,env=dev"

  # ==================== LOGGING & OBSERVABILITY ====================

  # OpenObserve - Logs, Metrics, Traces, Dashboards (replaces Loki + Promtail + Grafana)
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: betterbundle-openobserve-dev
    ports:
      - "5080:5080"
    environment:
      ZO_ROOT_USER_EMAIL: ${OPENOBSERVE_EMAIL:-admin@betterbundle.com}
      ZO_ROOT_USER_PASSWORD: ${OPENOBSERVE_PASSWORD:-BetterBundle@Dev2024}
      ZO_DATA_DIR: /data
      ZO_HTTP_PORT: "5080"
    volumes:
      - openobserve_data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:5080/healthz",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ==================== DASHBOARD AUTO-IMPORTER ====================
  dashboard-importer:
    image: curlimages/curl:latest
    container_name: betterbundle-dashboard-importer-dev
    environment:
      OPENOBSERVE_URL: http://openobserve:5080
      OPENOBSERVE_EMAIL: ${OPENOBSERVE_EMAIL:-admin@betterbundle.com}
      OPENOBSERVE_PASSWORD: ${OPENOBSERVE_PASSWORD:-BetterBundle@Dev2024}
      DASHBOARDS_DIR: /dashboards
      MAX_RETRIES: "30"
      RETRY_INTERVAL: "5"
    volumes:
      - ./infrastructure/dashboards:/dashboards:ro
      - ./infrastructure/scripts/import-dashboards.sh:/import-dashboards.sh:ro
    depends_on:
      openobserve:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache bash > /dev/null 2>&1
        bash /import-dashboards.sh
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ==================== TFRS INFERENCE SERVICE ====================
  tfrs-serving:
    build:
      context: ./tfrs-serving
      dockerfile: Dockerfile
    container_name: betterbundle-tfrs-serving-dev
    ports:
      - "5001:5000"
    volumes:
      - tfrs_models:/models
      - ./tfrs-serving/service.py:/app/service.py
      - ./tfrs-serving/startup.py:/app/startup.py
    environment:
      - PORT=5000
      - MODEL_BASE_PATH=/models
      - OCI_BUCKET=betterbundle-tfrs-models
      - OCI_USE_INSTANCE_PRINCIPAL=true
      - BENTOML_RELOAD=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "-X", "POST", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=bentoml,env=dev"

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  openobserve_data:
  tfrs_models:
