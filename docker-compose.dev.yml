services:
  # ==================== DATABASE ====================
  postgres:
    image: postgres:17
    container_name: betterbundle-postgres-dev
    env_file:
      - .env.dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=postgres,env=dev"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== KAFKA ====================
  kafka_b:
    image: confluentinc/cp-kafka:7.8.0 # Use specific version
    container_name: kafka_b_dev
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    env_file:
      - .env.dev
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka_b:9093,PLAINTEXT_HOST://localhost:9092
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka_b:29093
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9093,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=kafka,env=dev"
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ==================== KAFKA UI ====================
  kafka-ui:
    container_name: kafka-ui-dev
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka_b
    ports:
      - "8080:8080"
    env_file:
      - .env.dev
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kafka-kraft
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka_b:9093
      DYNAMIC_CONFIG_ENABLED: "true"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
        labels: "service=kafka-ui,env=dev"

  # ==================== KAFKA REST PROXY ====================
  rest-proxy:
    image: confluentinc/cp-kafka-rest:latest
    depends_on:
      - kafka_b
    ports:
      - "8082:8082"
    hostname: rest-proxy
    container_name: rest-proxy-dev
    env_file:
      - .env.dev
    environment:
      KAFKA_REST_HOST_NAME: rest-proxy
      KAFKA_REST_BOOTSTRAP_SERVERS: "kafka_b:9093"
      KAFKA_REST_LISTENERS: "http://0.0.0.0:8082"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
        labels: "service=rest-proxy,env=dev"

  # ==================== REDIS ====================
  redis:
    image: redis/redis-stack:7.2.0-v18
    container_name: betterbundle-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
      - "8002:8001"
    volumes:
      - redis_data:/data
    env_file:
      - .env.dev
    command:
      [
        "redis-server",
        "--requirepass",
        "${REDIS_PASSWORD:-}",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
        "--maxmemory",
        "256mb",
        "--maxmemory-policy",
        "allkeys-lru",
        "--protected-mode",
        "no",
      ]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=redis,env=dev"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ==================== GORSE MASTER ====================
  gorse-master:
    image: zhenghaoz/gorse-master:latest
    container_name: betterbundle-gorse-master-dev
    restart: unless-stopped
    ports:
      - "8086:8086"
      - "8088:8088"
    env_file:
      - .env.dev
    command:
      - -c
      - /etc/gorse/config.toml
      - --log-path
      - /var/log/gorse/master.log
      - --cache-path
      - /var/lib/gorse/master
    volumes:
      - ./config.toml:/etc/gorse/config.toml
      - gorse_logs:/var/log/gorse
      - gorse_cache:/var/lib/gorse
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=gorse-master,env=dev"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==================== GORSE SERVER ====================
  gorse-server:
    image: zhenghaoz/gorse-server:latest
    container_name: betterbundle-gorse-server-dev
    restart: unless-stopped
    ports:
      - "8089:8089"
    env_file:
      - .env.dev
    command:
      - -c
      - /etc/gorse/config.toml
      - --log-path
      - /var/log/gorse/server.log
      - --cache-path
      - /var/lib/gorse/server
    volumes:
      - ./config.toml:/etc/gorse/config.toml
      - gorse_logs:/var/log/gorse
      - gorse_server_cache:/var/lib/gorse/server
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=gorse-server,env=dev"
    depends_on:
      gorse-master:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==================== GORSE WORKER ====================
  gorse-worker:
    image: zhenghaoz/gorse-worker:latest
    container_name: betterbundle-gorse-worker-dev
    restart: unless-stopped
    env_file:
      - .env.dev
    command:
      - -c
      - /etc/gorse/config.toml
      - --log-path
      - /var/log/gorse/worker.log
      - --cache-path
      - /var/lib/gorse/worker
    volumes:
      - ./config.toml:/etc/gorse/config.toml
      - gorse_logs:/var/log/gorse
      - gorse_worker_cache:/var/lib/gorse/worker
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=gorse-worker,env=dev"
    depends_on:
      gorse-master:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==================== PYTHON WORKER ====================
  python-worker:
    build:
      context: ./python-worker
      dockerfile: Dockerfile.dev
    container_name: betterbundle-python-worker-dev
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    volumes:
      - ./python-worker:/app
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka_b:
        condition: service_healthy
      gorse-master:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=python-worker,env=dev"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── OpenObserve ──────────────────────────────────────
  openobserve:
    image: openobserve/openobserve:latest
    container_name: betterbundle-openobserve
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - ZO_ROOT_USER_EMAIL=admin@betterbundle.io
      - ZO_ROOT_USER_PASSWORD=${OPENOBSERVE_ADMIN_PASSWORD:-admin}
      - ZO_S3_BUCKET_NAME=betterbundle-observability
      - ZO_S3_REGION=us-east-1
      - ZO_S3_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - ZO_S3_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - ZO_S3_SERVER_URL=http://minio:9000
      - ZO_DATA_DIR=/data
      - ZO_LOCAL_MODE=false
      - ZO_TELEMETRY=false
    ports:
      - "5080:5080"
    volumes:
      - openobserve_data:/data
    networks:
      - betterbundle-network
    restart: unless-stopped

  # ── MinIO (S3-compatible storage for OpenObserve) ───
  minio:
    image: minio/minio:latest
    container_name: betterbundle-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - betterbundle-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  gorse_logs:
  gorse_cache:
  gorse_server_cache:
  gorse_worker_cache:
  openobserve_data:
  minio_data:

networks:
  betterbundle-network:
    driver: bridge
