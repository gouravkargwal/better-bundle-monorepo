services:
  # ==================== DATABASE ====================
  postgres:
    image: postgres:17
    container_name: betterbundle-postgres-dev
    env_file:
      - .env.dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=postgres,env=dev,logging=promtail"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== KAFKA ====================
  kafka_b:
    image: confluentinc/cp-kafka:7.8.0 # Use specific version
    container_name: kafka_b_dev
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    env_file:
      - .env.dev
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka_b:9093,PLAINTEXT_HOST://localhost:9092
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka_b:29093
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9093,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=kafka,env=dev,logging=promtail"
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s



  # ==================== REDIS ====================
  redis:
    image: redis/redis-stack:7.2.0-v18
    container_name: betterbundle-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
      - "8002:8001"
    volumes:
      - redis_data:/data
    env_file:
      - .env.dev
    command:
      - /bin/sh
      - -c
      - |
        exec redis-server --appendonly yes --appendfsync everysec --maxmemory 256mb --maxmemory-policy allkeys-lru --protected-mode no --loadmodule /opt/redis-stack/lib/redisearch.so --loadmodule /opt/redis-stack/lib/rejson.so --loadmodule /opt/redis-stack/lib/redistimeseries.so
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=redis,env=dev,logging=promtail"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ==================== GORSE ====================
  gorse:
    image: zhenghaoz/gorse-in-one:latest
    container_name: betterbundle-gorse-dev
    restart: unless-stopped
    ports:
      - "8086:8086"
      - "8088:8088"
    env_file:
      - .env.dev
    command:
      - -c
      - /etc/gorse/config.toml
      - --log-path
      - /var/log/gorse/master.log
      - --cache-path
      - /var/lib/gorse/master_cache.data
    volumes:
      - ./config.toml:/etc/gorse/config.toml
      - gorse_logs:/var/log/gorse
      - gorse_cache:/var/lib/gorse
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=gorse,env=dev,logging=promtail"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==================== LOGGING & OBSERVABILITY ====================

  # OpenObserve - Logs, Metrics, Traces, Dashboards (replaces Loki + Promtail + Grafana)
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: betterbundle-openobserve-dev
    ports:
      - "5080:5080"
    environment:
      ZO_ROOT_USER_EMAIL: ${OPENOBSERVE_EMAIL:-admin@betterbundle.com}
      ZO_ROOT_USER_PASSWORD: ${OPENOBSERVE_PASSWORD:-admin123}
      ZO_DATA_DIR: /data
      ZO_HTTP_PORT: "5080"
    volumes:
      - openobserve_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ==================== DASHBOARD AUTO-IMPORTER ====================
  dashboard-importer:
    image: curlimages/curl:latest
    container_name: betterbundle-dashboard-importer-local
    environment:
      OPENOBSERVE_URL: http://openobserve:5080
      OPENOBSERVE_EMAIL: ${OPENOBSERVE_EMAIL:-admin@betterbundle.com}
      OPENOBSERVE_PASSWORD: ${OPENOBSERVE_PASSWORD:-BetterBundle@Dev2024}
      DASHBOARDS_DIR: /dashboards
      MAX_RETRIES: "30"
      RETRY_INTERVAL: "5"
    volumes:
      - ./infrastructure/dashboards:/dashboards:ro
      - ./infrastructure/scripts/import-dashboards.sh:/import-dashboards.sh:ro
    depends_on:
      openobserve:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache bash > /dev/null 2>&1
        bash /import-dashboards.sh
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  gorse_logs:
  gorse_cache:
  openobserve_data:
