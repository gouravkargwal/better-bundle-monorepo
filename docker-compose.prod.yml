networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: false

services:
  # ==================== REMIX APPLICATION ====================
  remix-app:
    build:
      context: ./better-bundle
      dockerfile: Dockerfile.prod
    container_name: betterbundle-remix
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.prod
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      gorse-master:
        condition: service_started
      python-worker:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service,container"

  # ==================== DATABASES ====================
  postgres:
    image: postgres:17
    container_name: betterbundle-postgres
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - frontend
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service,container"

  redis:
    image: redis/redis-stack:7.2.0-v18
    container_name: betterbundle-redis
    env_file:
      - .env.prod
    ports:
      - "6379:6379"
      - "8002:8001"
    volumes:
      - redis_data:/data
    networks:
      - backend
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --appendfsync everysec --maxmemory 384mb --maxmemory-policy allkeys-lru --protected-mode yes --requirepass "$$REDIS_PASSWORD" --loadmodule /opt/redis-stack/lib/redisearch.so --loadmodule /opt/redis-stack/lib/rejson.so --loadmodule /opt/redis-stack/lib/redistimeseries.so
        else
          exec redis-server --appendonly yes --appendfsync everysec --maxmemory 384mb --maxmemory-policy allkeys-lru --protected-mode yes --loadmodule /opt/redis-stack/lib/redisearch.so --loadmodule /opt/redis-stack/lib/rejson.so --loadmodule /opt/redis-stack/lib/redistimeseries.so
        fi
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'if [ -n "$$REDIS_PASSWORD" ]; then redis-cli -a "$$REDIS_PASSWORD" ping; else redis-cli ping; fi',
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service,container"

  # ==================== KAFKA CLUSTER ====================
  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: betterbundle-kafka
    env_file:
      - .env.prod
    ports:
      - "127.0.0.1:9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_LOG4J_LOGGERS: "kafka.controller=WARN,kafka.producer.async.DefaultEventHandler=WARN,state.change.logger=WARN"
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx1g"
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
        reservations:
          cpus: "0.5"
          memory: 768M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service,container"

  kafka-ui:
    container_name: betterbundle-kafka-ui
    image: provectuslabs/kafka-ui:latest
    env_file:
      - .env.prod
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: production-kafka-kraft
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
      AUTH_TYPE: "DISABLED"
      JAVA_OPTS: "-Xms128m -Xmx256m"
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== GORSE MASTER ====================
  gorse-master:
    image: zhenghaoz/gorse-master:latest
    container_name: betterbundle-gorse-master
    env_file:
      - .env.prod
    ports:
      - "127.0.0.1:8086:8086"
      - "127.0.0.1:8088:8088"
    command:
      - -c
      - /etc/gorse/config.toml
      - --log-path
      - /var/log/gorse/master.log
      - --cache-path
      - /var/lib/gorse/master
    volumes:
      - ./config.toml:/etc/gorse/config.toml:ro
      - gorse_logs:/var/log/gorse
      - gorse_cache:/var/lib/gorse
    networks:
      - backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service,container"

  # ==================== GORSE SERVER ====================
  gorse-server:
    image: zhenghaoz/gorse-server:latest
    container_name: betterbundle-gorse-server
    env_file:
      - .env.prod
    ports:
      - "127.0.0.1:8089:8089"
    command:
      - -c
      - /etc/gorse/config.toml
      - --log-path
      - /var/log/gorse/server.log
      - --cache-path
      - /var/lib/gorse/server
    volumes:
      - ./config.toml:/etc/gorse/config.toml:ro
      - gorse_logs:/var/log/gorse
      - gorse_server_cache:/var/lib/gorse/server
    networks:
      - backend
    restart: unless-stopped
    depends_on:
      gorse-master:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service,container"

  # ==================== GORSE WORKER ====================
  gorse-worker:
    image: zhenghaoz/gorse-worker:latest
    container_name: betterbundle-gorse-worker
    env_file:
      - .env.prod
    # No public ports
    command:
      - -c
      - /etc/gorse/config.toml
      - --log-path
      - /var/log/gorse/worker.log
      - --cache-path
      - /var/lib/gorse/worker
    volumes:
      - ./config.toml:/etc/gorse/config.toml:ro
      - gorse_logs:/var/log/gorse
      - gorse_worker_cache:/var/lib/gorse/worker
    networks:
      - backend
    restart: unless-stopped
    depends_on:
      gorse-master:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service,container"

  # ==================== PYTHON WORKER ====================
  python-worker:
    build:
      context: ./python-worker
      dockerfile: Dockerfile.prod
    container_name: betterbundle-python-worker
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env.prod
    volumes:
      # Vertex AI service-account credentials (AI_PROVIDER=vertex), referenced by
      # GOOGLE_APPLICATION_CREDENTIALS in .env.prod. Place the real key file at
      # ./.secrets/gcp-service-account.json (gitignored, not checked in).
      - ./.secrets/gcp-service-account.json:/etc/gcp/service-account.json:ro
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      gorse-master:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service,container"

  # ==================== DJANGO ADMIN (BACKOFFICE) ====================
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: betterbundle-admin
    ports:
      - "127.0.0.1:8003:8000"
    env_file:
      - .env.prod
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c ''import urllib.request; urllib.request.urlopen("http://localhost:8000/")'' || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          cpus: "0.25"
          memory: 128M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service,container"

  # ==================== NGINX PROXY MANAGER ====================
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: betterbundle-nginx-proxy
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - frontend
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          cpus: "0.25"
          memory: 128M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── OpenObserve (production — uses AWS S3 natively) ──
  openobserve:
    image: openobserve/openobserve:latest
    container_name: betterbundle-openobserve
    env_file:
      - .env.prod
    environment:
      - ZO_ROOT_USER_EMAIL=admin@betterbundle.io
      - ZO_ROOT_USER_PASSWORD=${OPENOBSERVE_ADMIN_PASSWORD}
      - ZO_S3_BUCKET_NAME=betterbundle-observability
      - ZO_S3_REGION=${AWS_REGION:-us-east-1}
      - ZO_S3_ACCESS_KEY=${AWS_ACCESS_KEY_ID}
      - ZO_S3_SECRET_KEY=${AWS_SECRET_ACCESS_KEY}
      # ZO_S3_SERVER_URL is NOT set — uses AWS S3 natively
      - ZO_DATA_DIR=/data
      - ZO_LOCAL_MODE=false
      - ZO_TELEMETRY=false
    ports:
      - "127.0.0.1:5080:5080"
    volumes:
      - openobserve_data:/data
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  gorse_logs:
  gorse_cache:
  gorse_server_cache:
  gorse_worker_cache:
  npm_data:
  npm_letsencrypt:
  openobserve_data:
