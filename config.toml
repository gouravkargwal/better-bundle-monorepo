[database]
cache_store = "${GORSE_CACHE_STORE}"
data_store = "${GORSE_DATA_STORE}"
vector_store = "qdrant://qdrant:6334"

[database.mysql]
isolation_level = "READ-UNCOMMITTED"

[master]
port = 8086
host = "0.0.0.0"
http_port = 8088
http_host = "0.0.0.0"
n_jobs = 8
meta_timeout = "120s"

[model]
# Increase from default 16 to 128 to capture interactions among ~50 categorical labels
num_factors = 128
# L2 regularization to prevent overfitting with high-dimensional factors
regularization = 0.01
# Lower learning rate for stability with 128 factors
learning_rate = 0.005
# Sufficient epochs for convergence at this dimensionality
epochs = 100

[server]
default_n = 25
api_key = "${GORSE_API_KEY}"
cache_expire = "2h"
auto_insert_user = true
auto_insert_item = true
# Split-mode: gRPC port for recommendation serving
grpc_host = "0.0.0.0"
grpc_port = 8089
# Connect to master for job coordination
master_host = "gorse-master"
master_port = 8086

[worker]
# Number of CPU threads for model training
n_jobs = 4
# The worker connects to the master for job coordination
master_host = "gorse-master"
master_port = 8086

[recommend]
cache_size = 500000
cache_expire = "4h"
active_user_ttl = 0
enable_hot_recommend = true
enable_latest_recommend = true
enable_user_based_recommend = true
enable_item_based_recommend = true
enable_collaborative_recommend = true

[recommend.data_source]
positive_feedback_types = [
    "purchase",
    "high_value_purchase",
    "checkout_completed",
    "ready_to_buy",
    "strong_affinity",
    "conversion_session",
    "search_conversion"
]

read_feedback_types = [
    "product_viewed",
    "product_added_to_cart",
    "checkout_started",
    "progressing_interest",
    "high_engagement_session",
    "search_engagement",
    "basic_interest",
    "similar_to",  # Product similarity relationships from co-purchase analysis
    "new_item_discovery"  # Synthetic exploration signal for cold-start items
]

negative_feedback_types = [
    "refund",
    "product_removed_from_cart",
    "bounce",
    "session_bounce",
    "recommendation_declined",
    "recommendation_declined_high_confidence",
    "recommendation_declined_similar"
]

positive_feedback_ttl = 4320
item_ttl = 8760

[[recommend.non-personalized]]
name = "popular"
score = "1"

[[recommend.item-to-item]]
name = "neighbors"
# Embedding similarity via Gemini vectors stored in Labels.embedding.
# Gorse indexes these vectors in Qdrant (configured via database.vector_store)
# for approximate nearest-neighbor (ANN) search.
type = "embedding"
column = "item.Labels.embedding"

[[recommend.user-to-user]]
name = "neighbors"
# Use common-items similarity.
type = "items"

[recommend.collaborative]
type = "mf"
index_recall = 0.90
index_fit_epoch = 200
model_fit_period = "45m"
model_search_period = "3h"
model_search_epoch = 75
model_search_trials = 30
enable_model_size_search = true

# NOTE: this section used to be [recommend.ranking] (model = "fm", factors, epochs, ...).
# That key does not exist in Gorse's schema as of v0.5.x - it was renamed to
# [recommend.ranker], which is why ranking/reranking was silently a no-op before this
# change (Ranker.Type was empty, so the pipeline fell through to unranked candidate order).
[recommend.ranker]
type = "llm"
cache_expire = "120h"
recommenders = ["latest", "collaborative", "non-personalized/popular"]
fit_period = "45m"
fit_epoch = 100
optimize_period = "360m"
optimize_trials = 10
query_template = """
You are a product recommendation assistant for an e-commerce store. Given a customer who has shown interest in the following products:
{% for f in feedback -%}
- {{ f.Comment }}
{% endfor -%}
Please rank the candidate products below by how well they match this customer's interests.
"""
document_template = '{{ item.Comment | replace(",", " ") | replace("\n", " ") }}'

[recommend.ranker.early_stopping]
patience = 10

[recommend.ranker.reranker_api]
url = "http://python-worker:8000/api/v1/ai-rerank/rerank"
auth_token = "${AI_RERANK_TOKEN}"
model = "gemini-rerank"

# item-to-item via Gorse embedding column is DISABLED — Labels is now a flat
# []string (Gorse compatibility), so `item.Labels.embedding` would always
# resolve to nil. Item similarity is computed in the Python worker using
# Redis-cached embeddings and injected as explicit Gorse feedback.

[recommend.replacement]
enable_replacement = true
positive_replacement_decay = 0.80
read_replacement_decay = 0.65

[recommend.offline]
check_recommend_period = "20m"
refresh_recommend_period = "8h"
enable_latest_recommend = true
enable_popular_recommend = true
enable_user_based_recommend = true
enable_item_based_recommend = true
enable_collaborative_recommend = true
enable_click_through_prediction = true

[recommend.online]
fallback_recommend = [
    "collaborative",
    "item_based",
    "user_based",
    "popular",
    "latest"
]
num_feedback_fallback_item_based = 15
enable_realtime_recommend = true
enable_session_recommend = true
session_recommend_cache_size = 2000
session_recommend_cache_expire = "45m"

[tracing]
enable_tracing = true

[experimental]
enable_deep_learning = false
deep_learning_batch_size = 512

[oidc]
enable = false

[opentelemetry]
enabled = true
otlp_endpoint = "http://openobserve:5080/api/default/otlp/v1/metrics"
